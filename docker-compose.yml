services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: excisewatch
      POSTGRES_USER: excisewatch
      POSTGRES_PASSWORD: excisewatch_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excisewatch -d excisewatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  excisewatch-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://excisewatch:excisewatch_dev_password@postgres:5432/excisewatch
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  excisewatch-ui:
    build: .
    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://excisewatch-api:8000
      DATABASE_URL: postgresql://excisewatch:excisewatch_dev_password@postgres:5432/excisewatch
    volumes:
      - ./storage:/app/storage
    depends_on:
      - excisewatch-api

volumes:
  postgres_data:
