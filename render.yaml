services:
  - type: web
    name: excisewatch-cloud
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python scripts/start_render.py
    autoDeploy: true
    envVars:
      - key: API_BASE_URL
        value: http://127.0.0.1:8000
      - key: TELEGRAM_ENABLE_POLLING
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
